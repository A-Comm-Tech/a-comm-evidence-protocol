name: DCO
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Signed-off-by on every commit in the PR
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          while read -r sha; do
            if ! git log -1 --format=%B "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::Commit $sha is missing a DCO sign-off (git commit -s)"
              missing=1
            fi
          done < <(git rev-list "$BASE_SHA".."$HEAD_SHA" --no-merges)
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Every commit must carry: Signed-off-by: Your Name <you@example.com>"
            echo "See CONTRIBUTING.md and https://developercertificate.org"
            exit 1
          fi
          echo "All commits carry a DCO sign-off."
